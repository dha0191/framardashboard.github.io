<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAMAR Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', 'Segoe UI', Arial, sans-serif;
    background: #d8dce8;
    height: 100vh;
    overflow: hidden;
  }

  /* ========== LAYOUT ========== */
  .dashboard {
    display: grid;
    grid-template-columns: 190px 1fr 350px;
    height: 100vh;
    gap: 10px;
    padding: 10px;
  }

  /* ========== SIDEBAR ========== */
  .sidebar {
    background: #1a2240;
    border-radius: 20px;
    padding: 20px 15px;
    display: flex;
    flex-direction: column;
    color: white;
    overflow: hidden;
  }

  .logo-block { margin-bottom: auto; }

  .logo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: 2px;
    line-height: 1;
  }

  .logo-sub {
    color: #8DC63F;
    font-size: 13px;
    letter-spacing: 5px;
    font-weight: 300;
    margin-top: 2px;
  }

  /* Importante */
  .importante-block { margin-top: auto; }

  .imp-header {
    background: #8DC63F;
    color: #1a2240;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 15px;
    padding: 10px 12px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
    line-height: 1.25;
  }

  .imp-list {
    list-style: none;
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .imp-list::-webkit-scrollbar { display: none; }

  .imp-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 2px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: opacity 0.3s;
  }

  .imp-circle {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #2d3a65;
    border: 2px solid #4a5a90;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #8DC63F;
    font-weight: 900;
    transition: all 0.3s;
  }

  .imp-item.done .imp-circle {
    background: transparent;
    border-color: #8DC63F;
  }

  .imp-item.done .imp-label {
    opacity: 0.25;
    text-decoration: line-through;
  }

  .imp-label {
    font-size: 10px;
    color: #d0d4e8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.3s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
  }

  /* ========== MAIN CONTENT ========== */
  .main-content {
    background: #ffffff;
    border-radius: 20px;
    padding: 18px 18px 18px 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 300;
    letter-spacing: 12px;
    text-align: center;
    color: #1a2240;
    margin-bottom: 14px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Scroll container */
  .work-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 5px;
    scrollbar-width: thin;
    scrollbar-color: #8DC63F #e8eaf0;
  }
  .work-scroll::-webkit-scrollbar { width: 5px; }
  .work-scroll::-webkit-scrollbar-track { background: #e8eaf0; border-radius: 3px; }
  .work-scroll::-webkit-scrollbar-thumb { background: #8DC63F; border-radius: 3px; }

  /* Work row */
  .work-row {
    display: grid;
    grid-template-columns: 78px 1fr 90px 128px;
    margin-bottom: 7px;
    background: #f0f2f8;
    border-radius: 30px;
    overflow: visible;
    min-height: 52px;
    position: relative;
    transition: opacity 0.3s;
  }

  .work-row.is-empty { opacity: 0.38; }

  .w-cell {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    border-right: 2px solid #d4d8ea;
  }
  .w-cell:last-child { border-right: none; }

  /* Nota */
  .c-nota {
    border-radius: 30px 0 0 30px;
    justify-content: center;
  }
  .c-nota input {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #1a2240;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    text-align: center;
  }
  .c-nota input::placeholder { font-size: 12px; font-weight: 400; color: #bbb; }

  /* Descripcion */
  .c-desc { flex-direction: column; align-items: flex-start; justify-content: center; }
  .c-desc textarea {
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    color: #1a2240;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    width: 100%;
    height: 38px;
    line-height: 1.45;
  }
  .c-desc textarea::placeholder { color: #c0c4d8; }

  /* Fecha */
  .c-fecha { justify-content: center; }
  .c-fecha input {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #1a2240;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    text-align: center;
  }
  .c-fecha input::placeholder { font-size: 10px; font-weight: 400; color: #c0c4d8; }

  /* Status */
  .c-status {
    border-radius: 0 30px 30px 0;
    padding: 6px 8px;
    position: relative;
  }

  .s-btn {
    width: 100%;
    height: 38px;
    border: none;
    border-radius: 22px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1.2px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 13px;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .s-btn:hover { opacity: 0.88; }

  .st-HACER      { background: #6B2737; }
  .st-PROCESANDO { background: #C0392B; }
  .st-HECHO      { background: #27AE60; }
  .st-POR_DEFINIR{ background: #a0a4b8; }

  .s-dropdown {
    position: absolute;
    top: calc(100% - 2px);
    right: 8px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    z-index: 300;
    overflow: hidden;
    display: none;
    min-width: 115px;
  }
  .s-dropdown.open { display: block; }

  .s-opt {
    padding: 9px 16px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
  }
  .s-opt:hover { filter: brightness(1.1); }

  /* Row fade-out animation when HECHO */
  @keyframes rowOut {
    0%   { opacity: 1; transform: translateX(0); max-height: 60px; margin-bottom: 7px; }
    55%  { opacity: 0; transform: translateX(70px); max-height: 60px; }
    100% { opacity: 0; max-height: 0; margin-bottom: 0; }
  }
  .row-fading {
    animation: rowOut 0.65s ease forwards;
    pointer-events: none;
    overflow: hidden;
  }

  /* ========== RIGHT PANEL ========== */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Calendar card */
  .cal-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 14px 16px 12px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .cal-nav {
    background: #eef0f8;
    border: none;
    cursor: pointer;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #1a2240;
    font-weight: 900;
    line-height: 1;
    transition: background 0.2s;
  }
  .cal-nav:hover:not(:disabled) { background: #d4d8ea; }
  .cal-nav:disabled { opacity: 0.25; cursor: default; }

  .cal-month-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: #1a2240;
    letter-spacing: 3px;
    text-align: center;
    flex: 1;
  }

  .cal-year-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: #888;
    text-align: center;
    margin-top: -6px;
    margin-bottom: 4px;
    letter-spacing: 2px;
    display: none;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-hdr {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #888;
    padding: 3px 0;
    letter-spacing: 0.5px;
  }
  .cal-hdr.sa, .cal-hdr.do { color: #e74c3c; }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 50%;
    cursor: pointer;
    color: #1a2240;
    border: 2px solid transparent;
    background: transparent;
    outline: none;
    transition: all 0.15s;
  }
  .cal-day:hover:not(.cal-sun):not(.cal-empty) { background: rgba(141,198,63,0.18); }
  .cal-day.cal-empty { cursor: default; background: transparent !important; }
  .cal-day.cal-sun   { color: #ccc; cursor: not-allowed; font-weight: 400; }
  .cal-day.cal-sat   { color: #e74c3c; }
  .cal-day.cal-today { border-color: #C0392B; color: #C0392B; font-weight: 900; }
  .cal-day.cal-past:not(.g1-3):not(.g4-6):not(.g7-9) { opacity: 0.38; }
  .cal-day.g1-3 { background: #27AE60 !important; color: white !important; }
  .cal-day.g4-6 { background: #e67e22 !important; color: white !important; }
  .cal-day.g7-9 { background: #6B2737 !important; color: white !important; }

  /* ========== SEGUIMIENTO ========== */
  .seg-card {
    background: #ffffff;
    border-radius: 20px;
    padding: 14px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .seg-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #eef0f8;
  }

  .seg-lbl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #1a2240;
  }

  .seg-num {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .seg-num.np { background: #6B2737; }
  .seg-num.nh { background: #C0392B; }

  .prox-item {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #27AE60;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ========== NOTIFICATION ========== */
  .notif-bar {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #1a2240;
    color: white;
    padding: 12px 28px;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 1000;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
  }
  .notif-bar.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="dashboard">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo-block">
      <div class="logo-name">FRAMAR</div>
      <div class="logo-sub">dashboard</div>
    </div>

    <div class="importante-block">
      <div class="imp-header">IMPORTANTE,<br>NO OLVIDES</div>
      <ul class="imp-list" id="impList"></ul>
    </div>
  </aside>

  <!-- ===== LISTA DE TRABAJO ===== -->
  <main class="main-content">
    <h1 class="main-title">Lista &nbsp; de &nbsp; Trabajo</h1>
    <div class="work-scroll">
      <div id="workList"></div>
    </div>
  </main>

  <!-- ===== RIGHT PANEL ===== -->
  <div class="right-panel">

    <!-- Calendar -->
    <div class="cal-card">
      <div class="cal-header">
        <button class="cal-nav" id="btnPrev" onclick="calNav(-1)">&#8249;</button>
        <div>
          <div class="cal-month-label" id="calMonthLbl">MAYO</div>
          <div class="cal-year-label" id="calYearLbl">2025</div>
        </div>
        <button class="cal-nav" id="btnNext" onclick="calNav(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Seguimiento -->
    <div class="seg-card">
      <div class="seg-row">
        <span class="seg-lbl">TRABAJOS POR PRODUCIR</span>
        <div class="seg-num np" id="cntProc">0</div>
      </div>
      <div class="seg-row">
        <span class="seg-lbl">DISEÑOS POR HACER</span>
        <div class="seg-num nh" id="cntHacer">0</div>
      </div>
      <div class="prox-item" id="prox1">PROXIMA TAREA 1</div>
      <div class="prox-item" id="prox2">PROXIMA TAREA 2</div>
      <div class="prox-item" id="prox3">PROXIMA TAREA 3</div>
    </div>

  </div>
</div>

<div class="notif-bar" id="notifBar"></div>

<script>
(function () {
  'use strict';

  /* ---- Constants ---- */
  const MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
                  'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  const MAX_PER_DAY = 9;
  const IMP_TIMEOUT = 40 * 60 * 1000; // 40 min

  const SC = { HACER:'#6B2737', PROCESANDO:'#C0392B', HECHO:'#27AE60', POR_DEFINIR:'#a0a4b8' };
  const SL = { HACER:'HACER', PROCESANDO:'PROCESANDO', HECHO:'HECHO', POR_DEFINIR:'POR DEFINIR' };

  const TODAY = new Date();
  TODAY.setHours(0,0,0,0);

  /* ---- State ---- */
  let uid = 0;
  let workItems = [];
  let impItems  = [];
  let calYear   = TODAY.getFullYear();
  let calMonth  = TODAY.getMonth();

  /* =========================================
     WORK LIST
  ========================================= */
  function mkItem(nota, desc, fecha, status) {
    return { id: uid++, nota: nota||'', desc: desc||'', fecha: fecha||'', status: status||'POR_DEFINIR' };
  }

  function initWork() {
    for (let i = 0; i < 15; i++) workItems.push(mkItem());
    renderWork();
  }

  function renderWork() {
    const el = document.getElementById('workList');
    el.innerHTML = '';
    workItems.forEach(item => el.appendChild(buildRow(item)));
    updateSeg();
    renderCal();
  }

  function buildRow(item) {
    const empty = !item.nota && !item.desc && !item.fecha;
    const div = document.createElement('div');
    div.className = 'work-row' + (empty ? ' is-empty' : '');
    div.id = 'wr-' + item.id;

    div.innerHTML = `
      <div class="w-cell c-nota">
        <input type="text" maxlength="6" placeholder="NOTA"
          value="${esc(item.nota)}"
          data-id="${item.id}" data-f="nota" oninput="cellIn(this)">
      </div>
      <div class="w-cell c-desc">
        <textarea maxlength="90" placeholder="DESCRIPCION CORTA"
          data-id="${item.id}" data-f="desc" oninput="cellIn(this)">${esc(item.desc)}</textarea>
      </div>
      <div class="w-cell c-fecha">
        <input type="text" maxlength="5" placeholder="DD/MM"
          value="${esc(item.fecha)}"
          data-id="${item.id}" data-f="fecha" oninput="cellIn(this)">
      </div>
      <div class="w-cell c-status">
        <button class="s-btn st-${item.status}" id="sbtn-${item.id}"
          style="background:${SC[item.status]}"
          onclick="toggleDD(${item.id})">${SL[item.status]} <span>▾</span></button>
        <div class="s-dropdown" id="sdd-${item.id}">
          <div class="s-opt" style="background:#6B2737" onclick="setStatus(${item.id},'HACER')">HACER</div>
          <div class="s-opt" style="background:#C0392B" onclick="setStatus(${item.id},'PROCESANDO')">PROCESANDO</div>
          <div class="s-opt" style="background:#27AE60" onclick="setStatus(${item.id},'HECHO')">HECHO</div>
        </div>
      </div>`;
    return div;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.cellIn = function(el) {
    const id = +el.dataset.id, f = el.dataset.f;
    const item = workItems.find(i => i.id === id);
    if (!item) return;
    item[f] = el.value;
    const row = document.getElementById('wr-' + id);
    if (row) {
      row.classList.toggle('is-empty', !item.nota && !item.desc && !item.fecha);
    }
    updateSeg();
    renderCal();
  };

  window.toggleDD = function(id) {
    closeAllDD(id);
    const dd = document.getElementById('sdd-' + id);
    if (dd) dd.classList.toggle('open');
  };

  function closeAllDD(except) {
    document.querySelectorAll('.s-dropdown.open').forEach(d => {
      if (d.id !== 'sdd-' + except) d.classList.remove('open');
    });
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.c-status')) closeAllDD();
  });

  window.setStatus = function(id, status) {
    closeAllDD();
    const item = workItems.find(i => i.id === id);
    if (!item) return;
    item.status = status;

    if (status === 'HECHO') {
      const row = document.getElementById('wr-' + id);
      if (row) {
        row.classList.add('row-fading');
        setTimeout(() => {
          const idx = workItems.findIndex(i => i.id === id);
          if (idx >= 0) {
            const [gone] = workItems.splice(idx, 1);
            // Reset and push to bottom
            gone.id = uid++;
            gone.nota = ''; gone.desc = ''; gone.fecha = '';
            gone.status = 'POR_DEFINIR';
            workItems.push(gone);
          }
          renderWork();
        }, 660);
      }
    } else {
      const btn = document.getElementById('sbtn-' + id);
      if (btn) {
        btn.style.background = SC[status];
        btn.className = `s-btn st-${status}`;
        btn.innerHTML = SL[status] + ' <span>▾</span>';
      }
      updateSeg();
    }
  };

  /* =========================================
     SEGUIMIENTO
  ========================================= */
  function updateSeg() {
    const filled = workItems.filter(i => i.nota || i.desc);
    const proc  = filled.filter(i => i.status === 'PROCESANDO').length;
    const hacer = filled.filter(i => i.status === 'HACER').length;

    document.getElementById('cntProc').textContent  = proc;
    document.getElementById('cntHacer').textContent = hacer;

    const active = filled.filter(i => i.status === 'HACER' || i.status === 'PROCESANDO');
    for (let n = 1; n <= 3; n++) {
      const el = document.getElementById('prox' + n);
      const t  = active[n - 1];
      el.textContent = t ? (t.nota || t.desc.slice(0, 20) || 'TAREA').toUpperCase() : `PROXIMA TAREA ${n}`;
    }
  }

  /* =========================================
     IMPORTANTE
  ========================================= */
  function renderImp() {
    const ul = document.getElementById('impList');
    ul.innerHTML = '';
    impItems.forEach((item, i) => {
      if (item.hidden) return;
      const li = document.createElement('li');
      li.className = 'imp-item' + (item.done ? ' done' : '');
      li.innerHTML = `<div class="imp-circle">${item.done ? '✓' : ''}</div>
                      <span class="imp-label">${esc(item.text)}</span>`;
      li.onclick = () => toggleImp(i);
      ul.appendChild(li);
    });
  }

  function toggleImp(i) {
    const item = impItems[i];
    if (!item) return;
    item.done = !item.done;
    if (item.done) {
      clearTimeout(item.timer);
      item.timer = setTimeout(() => { item.hidden = true; renderImp(); }, IMP_TIMEOUT);
    } else {
      clearTimeout(item.timer);
    }
    renderImp();
  }

  /* =========================================
     CALENDAR
  ========================================= */
  function renderCal() {
    const monthLbl = document.getElementById('calMonthLbl');
    const yearLbl  = document.getElementById('calYearLbl');
    monthLbl.textContent = MONTHS[calMonth];

    const showYear = calYear !== TODAY.getFullYear();
    yearLbl.style.display = showYear ? 'block' : 'none';
    yearLbl.textContent = calYear;

    // Task count by date key dd/mm
    const byDate = {};
    workItems.forEach(it => {
      if (it.fecha && it.status !== 'HECHO' && it.status !== 'POR_DEFINIR') {
        byDate[it.fecha] = (byDate[it.fecha] || 0) + 1;
      }
    });

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // Headers
    ['LU','MA','MI','JU','VI','SA','DO'].forEach((h, i) => {
      const d = document.createElement('div');
      d.className = 'cal-hdr' + (i === 5 ? ' sa' : i === 6 ? ' do' : '');
      d.textContent = h;
      grid.appendChild(d);
    });

    // First day offset (Mon = 0)
    const firstDow = new Date(calYear, calMonth, 1).getDay();
    const offset   = (firstDow + 6) % 7;
    for (let i = 0; i < offset; i++) {
      const e = document.createElement('button');
      e.className = 'cal-day cal-empty';
      e.disabled = true;
      grid.appendChild(e);
    }

    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const tY = TODAY.getFullYear(), tM = TODAY.getMonth(), tD = TODAY.getDate();

    for (let d = 1; d <= daysInMonth; d++) {
      const dow  = (new Date(calYear, calMonth, d).getDay() + 6) % 7; // 0=Mon,6=Sun
      const isSun = dow === 6;
      const isSat = dow === 5;
      const isToday = d === tD && calMonth === tM && calYear === tY;
      const isPast  = new Date(calYear, calMonth, d) < TODAY;

      const mm  = String(calMonth + 1).padStart(2,'0');
      const dd  = String(d).padStart(2,'0');
      const key = `${dd}/${mm}`;
      const cnt = byDate[key] || 0;

      const btn = document.createElement('button');
      btn.textContent = d;

      let cls = 'cal-day';
      if (isSun) cls += ' cal-sun';
      else if (isSat) cls += ' cal-sat';
      if (isToday) cls += ' cal-today';
      if (isPast && !isToday) cls += ' cal-past';
      if (!isSun && cnt > 0) {
        if      (cnt <= 3) cls += ' g1-3';
        else if (cnt <= 6) cls += ' g4-6';
        else               cls += ' g7-9';
      }

      btn.className = cls;
      if (isSun) { btn.disabled = true; }
      else        { btn.onclick = () => onDayClick(d, cnt); }

      grid.appendChild(btn);
    }

    // Nav limits
    const minY = TODAY.getFullYear(), minM = TODAY.getMonth();
    const maxY = Math.max(TODAY.getFullYear(), 2026);

    document.getElementById('btnPrev').disabled = (calYear === minY && calMonth === minM);
    document.getElementById('btnNext').disabled = (calYear === maxY && calMonth === 11);
  }

  function onDayClick(d, cnt) {
    if (cnt >= MAX_PER_DAY) showNotif('AGENDA LLENA — PASA AL SIGUIENTE DÍA');
  }

  window.calNav = function(dir) {
    let m = calMonth + dir, y = calYear;
    if (m > 11) { m = 0; y++; }
    if (m <  0) { m = 11; y--; }

    const minY = TODAY.getFullYear(), minM = TODAY.getMonth();
    const maxY = Math.max(TODAY.getFullYear(), 2026);

    if (y < minY || (y === minY && m < minM)) return;
    if (y > maxY || (y === maxY && m > 11))   return;

    calYear = y; calMonth = m;
    renderCal();
  };

  /* =========================================
     NOTIFICATION
  ========================================= */
  let notifTimer = null;
  function showNotif(msg) {
    const n = document.getElementById('notifBar');
    n.textContent = msg;
    n.classList.add('show');
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => n.classList.remove('show'), 3200);
  }

  /* =========================================
     PUBLIC API — Claude usa esto para llenar datos
     Desde la consola del navegador:
       framar.addTask('015', 'Lona de taller', '12/05', 'HACER')
       framar.addImportante('Llamar a proveedor')
       framar.setData([...tasks], [...importantes])
  ========================================= */
  window.framar = {

    addTask(nota, desc, fecha, status) {
      const empty = workItems.find(i => !i.nota && !i.desc && !i.fecha);
      if (empty) {
        empty.nota = nota || '';
        empty.desc = desc || '';
        empty.fecha = fecha || '';
        empty.status = (status || 'POR_DEFINIR').toUpperCase().replace(' ', '_');
      } else {
        workItems.push(mkItem(nota, desc, fecha, (status||'POR_DEFINIR').toUpperCase().replace(' ','_')));
      }
      renderWork();
    },

    addImportante(text) {
      impItems.push({ text, done: false, hidden: false, timer: null });
      renderImp();
    },

    clearAll() {
      workItems = [];
      impItems  = [];
      for (let i = 0; i < 15; i++) workItems.push(mkItem());
      renderWork();
      renderImp();
    },

    /**
     * Carga datos completos de una sola vez.
     * tasks: [{ nota, desc, fecha, status }, ...]
     * importantes: ['texto 1', 'texto 2', ...]
     */
    setData(tasks, importantes) {
      workItems = [];
      impItems  = [];
      for (let i = 0; i < 15; i++) workItems.push(mkItem());
      if (tasks) tasks.forEach(t => this.addTask(t.nota, t.desc, t.fecha, t.status));
      if (importantes) importantes.forEach(t => this.addImportante(t));
    }
  };

  /* ---- Boot ---- */
  initWork();
  renderCal();
  renderImp();

})();
</script>
</body>
</html>
